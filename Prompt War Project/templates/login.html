{% extends "base.html" %}

{% block content %}
<div class="glass auth-container">
    <h2 style="font-size: 2rem; margin-bottom: 30px;">Welcome Back</h2>
    <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" class="form-input" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">Sign In</button>
    </form>
    <p style="margin-top: 25px; text-align: center; color: var(--text-secondary);">
        Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--text-primary); font-weight: 600; text-decoration: none;">Join now</a>
    </p>
    <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.05); font-size: 0.85rem; color: var(--text-secondary);">
        <p><strong>Demo Access:</strong></p>
        <p>Admin: <code>admin</code> / <code>admin123</code></p>
        <p>User: <code>fan</code> / <code>pass123</code></p>
    </div>
</div>
{% endblock %}
