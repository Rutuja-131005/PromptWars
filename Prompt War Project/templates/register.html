{% extends "base.html" %}

{% block content %}
<div class="glass auth-container">
    <h2 style="font-size: 2rem; margin-bottom: 30px;">Create Account</h2>
    <form action="{{ url_for('register') }}" method="POST">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="username" class="form-input" placeholder="Your Name" required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 20px;">Register</button>
    </form>
    <p style="margin-top: 25px; text-align: center; color: var(--text-secondary);">
        Already have an account? <a href="{{ url_for('login') }}" style="color: var(--text-primary); font-weight: 600; text-decoration: none;">Sign in</a>
    </p>
</div>
{% endblock %}
